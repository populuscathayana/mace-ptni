name: Deploy documentation

on:
  push:
    branches: [main]
    paths:
      - "ptni_mace_workflow/**"
      - ".github/workflows/pages.yml"
      - "VERSION"
      - "CHANGELOG_中文.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/configure-pages@v5
      - run: python ptni_mace_workflow/tools/build_docs_site.py --out-dir _site
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
